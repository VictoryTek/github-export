name: Nix Flake

on:
  push:
    branches: [main]
  pull_request:

jobs:
  nix-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix (with flakes enabled)
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Show flake outputs
        run: nix flake show

      - name: Check flake (evaluate all outputs)
        run: nix flake check --no-build

      - name: Build (best-effort until flake.lock is committed)
        # Build may fail in CI if Cargo.lock is not committed or if Linux GUI deps
        # cannot be satisfied in the CI environment.  We use --no-link to avoid
        # downloading the result into the workspace.  continue-on-error keeps the
        # rest of the flake checks unblocked while surfacing failures in the log.
        continue-on-error: true
        run: nix build .# --no-link --show-trace

      - name: Verify flake.nix exists
        run: |
          test -f flake.nix && echo "flake.nix present" || (echo "ERROR: flake.nix missing" && exit 1)

      - name: Verify Cargo.lock exists
        run: |
          test -f src-tauri/Cargo.lock && echo "src-tauri/Cargo.lock present" || (echo "ERROR: src-tauri/Cargo.lock missing -- commit it for reproducible Nix builds" && exit 1)
